services:
  flask:
    container_name: cadet-flask-container
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./schema:/app/schema
    ports:
      - "5000:5000"
    depends_on:
      - db 
    environment:
      POSTGRES_USER: cadet
      POSTGRES_PASSWORD: 0Space!
      POSTGRES_HOST: db     # This is the name of the database service in this file above
      POSTGRES_PORT: 5432
      POSTGRES_DB: cadet
  db:
    image: postgres:latest
    container_name: cadet-postgres-container
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cadet
      POSTGRES_PASSWORD: 0Space!
      POSTGRES_DB: cadet
    volumes:
      - postgres:/var/lib/postgres/docker
  pgadmin:
    image: dpage/pgadmin4
    container_name: cadet-pgadmin-container
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: sjv5866@g.rit.edu
      PGADMIN_DEFAULT_PASSWORD: A10qpwo29!
      PGADMIN_LISTEN_PORT: 80
      POSTGRES_PASSWORD: 0Space!
      POSTGRES_USER: cadet
      POSTGRES_DB: cadet
    volumes:
      - pgadmin4:/var/lib/pgadmin/docker
      - ./servers.json:/pgadmin4/servers.json
volumes:
  postgres:
  pgadmin4: