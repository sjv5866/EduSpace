services:
  db:
    image: postgres
    container_name: cadet-postgres-container
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cadet
      POSTGRES_PASSWORD: 0Space!
      POSTGRES_DB: cadet
    volumes:
      - postgres:/var/lib/postgresql/docker
  pgadmin:
    image: dpage/pgadmin4
    container_name: cadet-pgadmin-container
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: sjv5866@g.rit.edu
      PGADMIN_DEFAULT_PASSWORD: A10qpwo29!
    volumes:
      - pgadmin4:/var/lib/pgadmin/docker

volumes:
  postgres:
  pgadmin4: